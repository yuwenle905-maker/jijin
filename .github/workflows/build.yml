name: Build 定投管家 IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build JiJin.ipa
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build app
        run: |
          set -o pipefail
          SDK=$(xcodebuild -showsdks | grep -oE 'iphoneos[0-9.]+' | sort -V | tail -1)
          xcodebuild \
            -project JiJin.xcodeproj \
            -scheme JiJin \
            -configuration Release \
            -sdk "$SDK" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/Release-iphoneos" \
            build \
            2>&1 | tee build.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            tail -150 build.log
            exit $EXIT
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Package IPA
        run: |
          cd "${{ github.workspace }}/build/Release-iphoneos"
          APP=$(ls -d *.app | head -1)
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "${{ github.workspace }}/JiJin.ipa" Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JiJin-TrollStore
          path: JiJin.ipa
          retention-days: 30
          if-no-files-found: error
